name: Build Desktop App

# Builds the Tauri desktop installers.
# - Run manually from the Actions tab (workflow_dispatch), or
# - Push a tag like v0.1.0 to also publish a draft GitHub Release with the installers.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            artifact: windows-installers
            paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/msi/*.msi
          - platform: macos-latest
            artifact: macos-installers
            paths: |
              src-tauri/target/release/bundle/dmg/*.dmg

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # On a tag push -> create a draft release with the installers attached.
          # On manual run -> empty tag means "just build", no release.
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
          releaseName: MediSync ${{ github.ref_name }}
          releaseDraft: true
          prerelease: false

      - name: Upload installers as run artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.paths }}
          if-no-files-found: ignore
